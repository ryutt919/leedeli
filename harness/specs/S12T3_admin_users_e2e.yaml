id: S12T3
title: "유저 관리 Mock E2E 테스트"
category: auth
status: pending

description: |
  유저 관리 페이지의 접근 제어 및 핵심 기능을 Playwright mock E2E로 검증한다.

  e2e/mock/admin-users.spec.ts 생성:

  TC1: 비관리자는 /users 접근 시 /unauthorized로 리다이렉트
  TC2: 관리자는 /users 접근 시 유저 관리 페이지 렌더링 확인
  TC3: 관리자 목록이 화면에 표시됨 (mock 응답 기반)
  TC4: 이메일 입력 후 승격 버튼 클릭 시 성공 메시지 표시
  TC5: 존재하지 않는 이메일 입력 시 에러 메시지 표시

  Mock 전략:
  - 기존 auth.spec.ts의 mockLoggedIn helper 패턴 재사용.
  - admin_users 목록 조회: GET /rest/v1/admin_users* mock.
  - getUserIdByEmail RPC: POST /rest/v1/rpc/get_user_id_by_email mock.
  - grantAdmin insert: POST /rest/v1/admin_users mock.

implementation_targets:
  - e2e/mock/admin-users.spec.ts

acceptance_criteria:
  - TC1~TC5 모두 통과.
  - 비관리자 접근 차단 확인.
  - 관리자 목록 렌더링 확인.
  - 승격 성공/실패 메시지 확인.

test_command: "npx playwright test e2e/mock/admin-users.spec.ts --project=mock"
regression_command: "npx playwright test e2e/mock/ --project=mock"
