id: S12T4
title: "관리자 목록 이메일 표시"
category: db
status: pending

description: |
  유저 관리 페이지의 관리자 목록에서 UUID 대신 이메일이 표시되도록 수정한다.

  1. supabase/migrations/006_admin_email_rpc.sql 생성
     - SECURITY DEFINER 함수 `get_admin_users_with_email()` 추가
       auth.users와 조인하여 user_id, email, granted_at, granted_by 반환
     - 반환 타입: TABLE(id uuid, user_id uuid, email text, granted_at timestamptz, granted_by uuid)

  2. src/storage/adminUsersRepo.ts 수정
     - listAdmins() 함수를 RPC `get_admin_users_with_email` 호출로 교체
     - 반환 타입에 email: string 필드 추가

  3. src/pages/UserManagementPage.tsx 수정
     - 관리자 목록 테이블/리스트에서 user_id(UUID) 대신 email 표시
     - email이 없을 경우 UUID fallback 처리

implementation_targets:
  - supabase/migrations/006_admin_email_rpc.sql
  - src/storage/adminUsersRepo.ts
  - src/pages/UserManagementPage.tsx

acceptance_criteria:
  - 006_admin_email_rpc.sql 존재 및 get_admin_users_with_email 함수 정의 포함.
  - adminUsersRepo.ts listAdmins() 반환 타입에 email 필드 포함.
  - UserManagementPage 관리자 목록에 UUID 대신 이메일 렌더링.
  - npm run build 통과.

test_command: "npm run build"
regression_command: "npx playwright test e2e/mock/admin-users.spec.ts --project=mock"
