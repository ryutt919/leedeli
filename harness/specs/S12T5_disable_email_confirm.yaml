id: S12T5
title: "이메일 인증 비활성화"
category: db
status: pending

description: |
  Supabase 이메일 인증 요구 없이 이메일+비밀번호만으로 로그인 가능하도록 설정한다.
  auth.config 테이블이 없으므로 DB trigger와 기존 미인증 계정 일괄 처리로 구현한다.

  1. supabase/migrations/007_auto_confirm_email.sql 생성

     a) 기존 미인증 사용자 일괄 확인 처리:
        UPDATE auth.users
        SET email_confirmed_at = NOW(),
            confirmed_at = NOW()
        WHERE email_confirmed_at IS NULL;

     b) 신규 가입 시 자동 인증 trigger:
        CREATE OR REPLACE FUNCTION auth.auto_confirm_email()
        RETURNS TRIGGER LANGUAGE plpgsql SECURITY DEFINER AS $$
        BEGIN
          NEW.email_confirmed_at := COALESCE(NEW.email_confirmed_at, NOW());
          NEW.confirmed_at := COALESCE(NEW.confirmed_at, NOW());
          RETURN NEW;
        END;
        $$;

        DROP TRIGGER IF EXISTS on_auth_user_created_auto_confirm ON auth.users;
        CREATE TRIGGER on_auth_user_created_auto_confirm
          BEFORE INSERT ON auth.users
          FOR EACH ROW EXECUTE FUNCTION auth.auto_confirm_email();

  주의: Supabase 대시보드 Authentication > Providers > Email에서
  "Confirm email" 토글도 OFF로 설정하면 완전히 비활성화된다.
  이 마이그레이션은 토글 설정과 무관하게 DB 레벨에서 동작한다.

implementation_targets:
  - supabase/migrations/007_auto_confirm_email.sql

acceptance_criteria:
  - 007_auto_confirm_email.sql 존재.
  - 기존 미인증 사용자 UPDATE 구문 포함.
  - auto_confirm_email trigger 함수 및 trigger 정의 포함.
  - npm run build 통과.

test_command: "npm run build"
regression_command: "npm run build"
