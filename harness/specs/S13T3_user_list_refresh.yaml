id: S13T3
title: "전체 유저 목록 신규 회원 표시 + 새로고침 버튼"
category: ui
status: pending

description: |
  관리자 페이지에서 새로 가입한 유저가 목록에 보이지 않는 문제를 수정한다.

  근본 원인 (복합적):
    1. get_all_users_for_admin RPC(008_all_users_rpc.sql)가 실제 Supabase에
       미적용된 경우 RPC 호출 실패 → getAllUsers() throw → catch에서 에러만 로그
       → 빈 목록으로 표시됨 (에러 UI 없음).
    2. 페이지 마운트 시 1회만 조회하므로 페이지 열린 후 가입한 신규 회원은
       수동 새로고침 없이는 보이지 않음.

  수정 방법 (src/pages/UserManagementPage.tsx):
    - usersError 상태 추가: getAllUsers() 실패 시 Alert(error)로 표시.
    - "전체 유저 목록" 카드에 새로고침 버튼(ReloadOutlined) 추가.
    - refreshUsers() 실패 시 usersError 메시지 설정.

  DB 수정 없음 (008_all_users_rpc.sql이 올바르게 정의되어 있음).
  단, 해당 마이그레이션이 실제 Supabase에 적용되지 않은 경우 별도 적용 필요.

implementation_targets:
  - src/pages/UserManagementPage.tsx

acceptance_criteria:
  - 전체 유저 목록 카드에 '새로고침' 버튼 존재.
  - getAllUsers() 실패 시 오류 메시지 Alert로 표시.
  - 새로고침 버튼 클릭 시 목록 재조회.
  - npm run build 통과.

test_command: "npm run build"
regression_command: "npx playwright test e2e/mock/admin-users.spec.ts --project=mock"
