id: S8T1
title: "초기 로딩 최적화 + 로그인 버튼"
category: auth
status: pending

description: |
  앱 최초 진입 시 로딩 지연 제거 및 비로그인 상태에서 로그인 화면이
  즉시 표시되도록 개선한다. 수동으로도 로그인/로그아웃이 가능하도록
  MobileShell 드로어에 버튼을 추가한다.

implementation_targets:
  - src/components/RequireAuth.tsx
  - src/layouts/MobileShell.tsx
  - vite.config.ts

acceptance_criteria:
  - 비로그인 상태에서 앱 진입 시 spinner 없이 즉시 /login으로 redirect됨
  - MobileShell 드로어 메뉴에 로그인(비로그인 시) 또는 로그아웃(로그인 시) 버튼이 표시됨
  - 로그아웃 버튼 클릭 시 세션 종료 후 /login으로 이동함
  - npm run build 통과 (코드 스플리팅 적용)
  - npx playwright test e2e/mock/auth.spec.ts 전체 통과

test_command: "npx playwright test e2e/mock/auth.spec.ts --project=mock"
regression_command: "npm run build && npm run typecheck && npx playwright test e2e/mock/ --project=mock"

notes: |
  RequireAuth의 loading 중 Spin → null 반환으로 변경.
  MobileShell에 useAuth() + supabase.auth.signOut() 추가.
  vite.config.ts에 manualChunks 추가 (vendor-react, vendor-ant, vendor-supabase).
  이 spec은 이미 2026-04-04 세션에서 구현 완료됨.
