id: S13T1
title: "회원가입 비밀번호 확인 + 비관리자 자동 로그인 차단"
category: auth
status: pending

description: |
  두 가지 회원가입 버그를 동시에 수정한다.

  1. 비관리자 회원가입 후 메인 페이지 진입 가능 버그
     근본 원인:
       - Supabase 자동 이메일 인증(007_auto_confirm_email.sql)으로 signUp() 직후 세션이 생성됨.
       - onAuthStateChange SIGNED_IN 이벤트 발화 → AuthContext session이 non-null로 설정.
       - LoginPage 상단 `if (session) return <Navigate to="/" />` 가 즉시 트리거.
       - HomePage는 RequireAuth(session 체크)만 있고 RequireAdmin이 없으므로 비관리자도 진입 가능.
     수정 방법:
       - signUp() 성공 직후 `await supabase.auth.signOut()` 호출.
       - 성공 메시지를 '회원가입 성공! 관리자에게 접근 권한을 요청하세요.'로 변경.
       - form.resetFields() 후 setIsSignUp(false).

  2. 비밀번호 확인 필드 누락
     수정 방법:
       - Form.useForm() 인스턴스 추가 (form).
       - 회원가입 모드에서 confirmPassword 필드 추가 (password 이후).
       - dependencies={['password']} + validator로 일치 여부 검사.
       - 로그인/회원가입 전환 시 form.resetFields() 호출.

  변경 대상 파일: src/pages/LoginPage.tsx 만 수정.

implementation_targets:
  - src/pages/LoginPage.tsx

acceptance_criteria:
  - 회원가입 성공 후 supabase.auth.signOut() 호출로 세션 초기화.
  - 회원가입 후 LoginPage에 머무름 (홈 페이지로 이동하지 않음).
  - 회원가입 폼에 '비밀번호 확인' 필드 존재 (isSignUp=true일 때만).
  - 비밀번호 불일치 시 '비밀번호가 일치하지 않습니다' 오류 표시.
  - 로그인/회원가입 전환 시 폼 초기화.
  - npm run build 통과.

test_command: "npx playwright test e2e/mock/auth.spec.ts --project=mock"
regression_command: "npx playwright test e2e/mock/ --project=mock"
