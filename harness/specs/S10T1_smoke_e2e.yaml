id: S10T1
title: "smoke E2E 실 DB 전체 검증"
category: smoke
status: pending

description: |
  실제 Supabase DB에 연결하여 smoke E2E 테스트를 완전히 통과시킨다.
  S7T1~S7T3 스펙이 이미 존재하며 환경변수만 갖추면 실행 가능하다.

implementation_targets:
  - e2e/smoke/     # 기존 테스트 수정 또는 보완
  - .env           # 환경변수 확인 (커밋 금지)

prerequisites:
  - SUPABASE_SERVICE_ROLE_KEY 환경변수 설정
  - TEST_ADMIN_EMAIL / TEST_ADMIN_PASSWORD 설정
  - TEST_USER_EMAIL / TEST_USER_PASSWORD 설정
  - 실제 Supabase 프로젝트에 admin_users 정책 적용 완료 (migration 004)
  - 실제 Supabase 프로젝트에 preps.data 컬럼 존재 (migration 005)

acceptance_criteria:
  - npx playwright test e2e/smoke/ --project=smoke 전체 통과
  - 테스트 종료 후 테스트 데이터 자동 정리 (afterAll cleanup)
  - 비관리자 접근 차단 확인
  - 관리자 부여 시나리오 통과

test_command: "npx playwright test e2e/smoke/ --project=smoke"
regression_command: "npx playwright test e2e/mock/ --project=mock"

notes: |
  환경변수 없으면 자동 스킵 처리가 되어 있어야 함.
  smoke 테스트는 실 DB를 오염시키지 않도록 afterAll cleanup이 반드시 포함되어야 함.
  service_role 키는 .env에만 보관, 절대 코드에 하드코딩 금지.
